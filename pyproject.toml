[project]
name = "test-cli"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "litellm",
    "pexpect",
    "pytest>=9.0.2",
    "rich",
    "truststore",
]

[project.scripts]
terminus2-cli = "cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["agents"]
include = ["cli.py", "harbor_config.py", "agents/"]

[tool.ruff]
cache-dir = ".local/cache/ruff"

[tool.pytest.ini_options]
testpaths = ["tests"]
cache_dir = ".local/cache/pytest"

[tool.mypy]
cache_dir = ".local/cache/mypy"

[dependency-groups]
dev = [
    "matplotlib>=3.10.8",
]
